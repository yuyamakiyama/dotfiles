model = "gpt-5.5"
model_reasoning_effort = "high"
model_verbosity = "low"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
project_doc_max_bytes = 65536
project_doc_fallback_filenames = ["CLAUDE.md"]

[features]
hooks = true
multi_agent = true

[projects."/Users/yuya"]
trust_level = "trusted"

[projects."/Users/yuya/.local/share/chezmoi"]
trust_level = "trusted"

[projects."/Users/yuya/.zsh"]
trust_level = "trusted"

[projects."/Users/yuya/apps/jobs-scraper"]
trust_level = "trusted"

[projects."/Users/yuya/ghq/github.com/Anti-Pattern-Inc/engineed-dev-env"]
trust_level = "trusted"

[projects."/Users/yuya/ghq/github.com/dinii-inc/dinii-self-all"]
trust_level = "trusted"

[projects."/Users/yuya/ghq/github.com/sindresorhus/type-fest"]
trust_level = "trusted"

[projects."/Users/yuya/ghq/github.com/yuyamakiyama/ClipVocab"]
trust_level = "trusted"

[projects."/Users/yuya/ghq/github.com/yuyamakiyama/Nand2Tetris"]
trust_level = "trusted"

[projects."/Users/yuya/ghq/github.com/yuyamakiyama/Tango"]
trust_level = "trusted"

[projects."/Users/yuya/ghq/github.com/yuyamakiyama/job-search"]
trust_level = "trusted"

[projects."/Users/yuya/ghq/github.com/yuyamakiyama/slack-ui-hider"]
trust_level = "trusted"

[mcp_servers.mobile]
command = "npx"
args = ["-y", "@mobilenext/mobile-mcp@latest"]

[mcp_servers.Notion]
url = "https://mcp.notion.com/sse"

[[hooks.PreToolUse]]
matcher = "^Bash$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "bun ~/.codex/hooks/block-japanese-commit.ts"
timeout = 30
statusMessage = "Checking commit message language"

[[hooks.PostToolUse]]
matcher = "Edit|Write|apply_patch"

[[hooks.PostToolUse.hooks]]
type = "command"
command = "bun ~/.codex/hooks/flag-redundant-comments.ts"
timeout = 30
statusMessage = "Checking comments"
